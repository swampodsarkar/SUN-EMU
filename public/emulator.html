<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emulator</title>
    <style>
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background-color: #000 !important;
            overflow: hidden !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
        }
        #game, #game * {
            box-sizing: border-box !important;
        }
        #game {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
            background: #000 !important;
        }
        /* Make sure the emulator canvas occupies the whole screen */
        #game canvas, .emulator-canvas, canvas {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        /* Completely hide any EmulatorJS menu bar, loader headers, settings tabs, etc. to prevent blank gaps at the top */
        .ejs-header, .ejs-menu, .menu, .top-bar, .header, .menu-bar, #menu, #menu-bar, .navbar, .nav {
            display: none !important;
            height: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Setup mock gamepads for 4 players so multiplayer works seamlessly
        const mockGamepads = [null, null, null, null];
        for (let i = 0; i < 4; i++) {
            mockGamepads[i] = {
                id: "Virtual Gamepad (Player " + (i + 1) + ")",
                index: i,
                connected: true,
                timestamp: Date.now(),
                mapping: "standard",
                axes: [0, 0, 0, 0],
                buttons: Array.from({ length: 17 }, () => ({ pressed: false, value: 0 }))
            };
        }

        navigator.getGamepads = function() {
            return mockGamepads;
        };
        if (navigator.webkitGetGamepads) {
            navigator.webkitGetGamepads = function() {
                return mockGamepads;
            };
        }

        function updateGamepadInputs(slotIndex, inputs) {
            if (slotIndex < 0 || slotIndex >= 4) return;
            const gamepad = mockGamepads[slotIndex];
            if (!gamepad) return;
            
            gamepad.timestamp = Date.now();
            
            const setButton = (index, pressed) => {
                if (index >= 0 && index < gamepad.buttons.length) {
                    gamepad.buttons[index] = {
                        pressed: !!pressed,
                        value: pressed ? 1.0 : 0.0
                    };
                }
            };
            
            // Clear all buttons and axes
            for (let i = 0; i < 17; i++) {
                setButton(i, false);
            }
            gamepad.axes = [0, 0, 0, 0];
            
            if (!inputs) return;

            // D-Pad buttons: Up (12), Down (13), Left (14), Right (15)
            if (inputs["ArrowUp"]) setButton(12, true);
            if (inputs["ArrowDown"]) setButton(13, true);
            if (inputs["ArrowLeft"]) setButton(14, true);
            if (inputs["ArrowRight"]) setButton(15, true);
            
            // Select (8), Start (9)
            if (inputs["Shift"]) setButton(8, true);
            if (inputs["Enter"]) setButton(9, true);
            
            // Face buttons (A/B/X/Y)
            if (inputs["z"]) setButton(0, true); // B -> Face Bottom (A/Cross)
            if (inputs["x"]) setButton(1, true); // A -> Face Right (B/Circle)
            if (inputs["a"]) setButton(2, true); // Y -> Face Left (X/Square)
            if (inputs["s"]) setButton(3, true); // X -> Face Top (Y/Triangle)
            
            // Shoulder triggers (L1/R1/L2/R2)
            if (inputs["q"]) setButton(4, true); // L1
            if (inputs["w"]) setButton(5, true); // R1
            if (inputs["e"]) setButton(6, true); // L2
            if (inputs["r"]) setButton(7, true); // R2
            
            // Stick clicks
            if (inputs["t"]) setButton(10, true); // L3
            if (inputs["y"]) setButton(11, true); // R3
            
            // Menu / Home button
            if (inputs["Escape"]) setButton(16, true);
            
            // N64 C-buttons as Right Stick Axes fallback
            if (inputs["j"]) gamepad.axes[2] = -1.0;
            if (inputs["l"]) gamepad.axes[2] = 1.0;
            if (inputs["i"]) gamepad.axes[3] = -1.0;
            if (inputs["k"]) gamepad.axes[3] = 1.0;
        }

        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data && data.type === 'START_EMULATOR') {
                if (window.EJS_STARTED) return;
                window.EJS_STARTED = true;

                try {
                    localStorage.removeItem('EJS_settings');
                } catch(e) {}

                window.EJS_player = "#game";
                window.EJS_core = data.core;
                window.EJS_gameUrl = data.gameUrl;
                window.EJS_gameID = 1;
                window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                window.EJS_color = "#4f46e5";
                window.EJS_startOnLoaded = true;
                window.EJS_showMenu = false;

                const script = document.createElement("script");
                script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(script);
            } else if (data && data.type === 'KEY_EVENT') {
                const ev = new KeyboardEvent(data.eventType, {
                    key: data.key,
                    code: data.code,
                    keyCode: data.keyCode,
                    which: data.keyCode,
                    bubbles: true,
                    cancelable: true
                });
                document.dispatchEvent(ev);
                const canvas = document.querySelector('#game canvas');
                if (canvas) {
                    canvas.dispatchEvent(ev);
                }
            } else if (data && data.type === 'CONTROLLER_INPUT') {
                updateGamepadInputs(data.playerSlot - 1, data.inputs);
            }
        });
        
        // Notify parent that iframe is ready
        window.parent.postMessage({ type: 'EMULATOR_READY' }, '*');

        // Capture ESC key and notify parent
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.keyCode === 27) {
                window.parent.postMessage({ type: 'ESC_PRESSED' }, '*');
            }
        }, true);
    </script>
</body>
</html>
