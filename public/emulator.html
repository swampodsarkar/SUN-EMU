<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emulator</title>
    <style>
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background-color: #000 !important;
            overflow: hidden !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
        }
        #game, #game * {
            box-sizing: border-box !important;
        }
        #game {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
            background: #000 !important;
        }
        /* Hide any unwanted headers, top bars or white spaces from EmulatorJS loader */
        .ejs-header, .ejs-menu, .menu, .top-bar, .header {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data && data.type === 'START_EMULATOR') {
                if (window.EJS_STARTED) return;
                window.EJS_STARTED = true;

                try {
                    localStorage.removeItem('EJS_settings');
                } catch(e) {}

                window.EJS_player = "#game";
                window.EJS_core = data.core;
                window.EJS_gameUrl = data.gameUrl;
                window.EJS_gameID = 1;
                window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                window.EJS_color = "#4f46e5";
                window.EJS_startOnLoaded = true;

                const script = document.createElement("script");
                script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(script);
            } else if (data && data.type === 'KEY_EVENT') {
                const ev = new KeyboardEvent(data.eventType, {
                    key: data.key,
                    code: data.code,
                    keyCode: data.keyCode,
                    which: data.keyCode,
                    bubbles: true,
                    cancelable: true
                });
                document.dispatchEvent(ev);
                const canvas = document.querySelector('#game canvas');
                if (canvas) {
                    canvas.dispatchEvent(ev);
                }
            }
        });
        
        // Notify parent that iframe is ready
        window.parent.postMessage({ type: 'EMULATOR_READY' }, '*');

        // Capture ESC key and notify parent
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.keyCode === 27) {
                window.parent.postMessage({ type: 'ESC_PRESSED' }, '*');
            }
        }, true);
    </script>
</body>
</html>
